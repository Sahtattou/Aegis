services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: aegis-api
    ports:
      - "8000:8000"
    networks:
      - app_net
      - redteam_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aegis-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - app_net

  kali-redteam:
    image: kalilinux/kali-rolling
    container_name: aegis-kali-redteam
    profiles:
      - redteam
    command: ["tail", "-f", "/dev/null"]
    tty: true
    stdin_open: true
    restart: "no"
    environment:
      - REDTEAM_TARGET_API_URL=http://api:8000/api/redteam/run
      - REDTEAM_MODE=simulation
    networks:
      - redteam_net

networks:
  app_net:
    driver: bridge
  redteam_net:
    driver: bridge
    internal: true
