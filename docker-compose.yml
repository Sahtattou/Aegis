version: "3.9"

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: haris-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    env_file:
      - .env
    volumes:
      - ./neo4j/init:/docker-entrypoint-initdb.d
      - ./neo4j/plugins:/plugins

  api:
    build:
      context: ./api
    container_name: haris-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - neo4j

  frontend:
    build:
      context: ./frontend
    container_name: haris-frontend
    ports:
      - "5173:5173"
    depends_on:
      - api
